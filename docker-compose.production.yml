version: '3.9'

services:
  # MongoDB databases for each app
  mongo-master:
    image: mongo:7.0
    container_name: mongo-master
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-change-me}
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - apps-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me}
    volumes:
      - redis-data:/data
    networks:
      - apps-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx reverse proxy
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - api-gateway
    networks:
      - apps-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # API Gateway
  api-gateway:
    image: node:18-alpine
    container_name: api-gateway
    restart: always
    working_dir: /app
    command: npm start
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ./api-gateway:/app
    depends_on:
      mongo-master:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - apps-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3


  01_snapsave:
    build:
      context: ./apps/01-SnapSave/backend
      dockerfile: Dockerfile
    container_name: 01_snapsave
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD:-change-me}@mongo-master:27017/01_snapsave?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me}@redis:6379
      JWT_SECRET: ${JWT_SECRET_1:-change-me}
      API_GATEWAY_URL: http://api-gateway:3000
    depends_on:
      mongo-master:
        condition: service_healthy
