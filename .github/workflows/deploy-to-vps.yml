name: Deploy to VPS

# Trigger on pushes to any branch
on:
  push:
    branches:
      - '**'

# Allow manual trigger
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Only deploy on main and claude/* branches
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Extract branch name
        id: branch
        run: echo "name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$VPS_PORT" "$VPS_USERNAME@$VPS_HOST" << 'SCRIPT'
          set -e

          cd /home/traffic2u

          echo "==================================="
          echo "Starting deployment..."
          echo "==================================="

          # Verify .env file exists (should be configured on VPS)
          if [ ! -f .env ]; then
            echo "Error: .env file not found on VPS"
            echo "Please ensure .env file is configured on VPS at /home/traffic2u/.env"
            exit 1
          fi

          echo "[1/6] Pulling latest code from ${{ env.BRANCH }}..."
          git fetch origin
          git checkout ${{ env.BRANCH }}
          git pull origin ${{ env.BRANCH }}

          echo "[2/6] Installing dependencies..."
          npm ci

          echo "[3/6] Building Docker images..."
          docker-compose build --no-cache 2>&1 | tail -20

          echo "[4/6] Deploying containers..."
          docker-compose down --remove-orphans || true
          docker-compose up -d

          echo "[5/6] Waiting for services to be healthy..."
          sleep 10

          echo "[6/6] Running database migrations..."
          npm run db:push || true

          echo ""
          echo "==================================="
          echo "✅ Deployment successful!"
          echo "==================================="
          docker-compose ps
          SCRIPT

      - name: Verify deployment
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$VPS_PORT" "$VPS_USERNAME@$VPS_HOST" << 'SCRIPT'
          echo ""
          echo "Service Status:"
          docker-compose ps

          echo ""
          echo "Recent logs:"
          docker-compose logs --tail=20 | head -50
          SCRIPT

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment to VPS successful!"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date)"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment to VPS failed!"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          exit 1

  notify-slack:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment ${{ job.status }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
