global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'traffic2umarketing-production'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongo-master:27017']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

alert_rules_files:
  - '/etc/prometheus/alert-rules.yml'
