user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=200r/s;

    # Cache settings
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=next_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # Upstream servers
    upstream pet_insurance {
        server pet-insurance:3000;
    }

    upstream disability_insurance {
        server disability-insurance:3000;
    }

    upstream cyber_insurance {
        server cyber-insurance:3000;
    }

    upstream travel_insurance {
        server travel-insurance:3000;
    }

    upstream umbrella_insurance {
        server umbrella-insurance:3000;
    }

    upstream motorcycle_insurance {
        server motorcycle-insurance:3000;
    }

    upstream sr22_insurance {
        server sr22-insurance:3000;
    }

    upstream wedding_insurance {
        server wedding-insurance:3000;
    }

    upstream drone_insurance {
        server drone-insurance:3000;
    }

    upstream landlord_insurance {
        server landlord-insurance:3000;
    }

    # HTTP redirect to HTTPS
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS servers for each domain
    # Pet Insurance
    server {
        listen 443 ssl http2;
        server_name petcovercompare.com www.petcovercompare.com;

        ssl_certificate /etc/nginx/ssl/petcovercompare.com.crt;
        ssl_certificate_key /etc/nginx/ssl/petcovercompare.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://pet_insurance;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_cache next_cache;
                proxy_cache_valid 200 60d;
                add_header Cache-Control "public, max-age=31536000, immutable";
            }
        }
    }

