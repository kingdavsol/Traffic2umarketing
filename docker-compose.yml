version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: traffic2u_postgres
    environment:
      POSTGRES_DB: traffic2u
      POSTGRES_USER: ${DATABASE_USER:-traffic2u_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change_me_strong_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-traffic2u_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - traffic2u_network

  # Pet Insurance Site
  pet-insurance:
    build:
      context: .
      dockerfile: apps/pet-insurance-compare/Dockerfile
    container_name: pet-insurance-app
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER:-traffic2u_user}:${DATABASE_PASSWORD:-change_me_strong_password}@postgres:5432/traffic2u
      NEXT_PUBLIC_APP_URL: ${PET_APP_URL:-https://petcovercompare.com}
      NEXT_PUBLIC_API_URL: ${PET_API_URL:-https://petcovercompare.com/api}
      RESEND_API_KEY: ${RESEND_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - traffic2u_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Disability Insurance Site
  disability-insurance:
    build:
      context: .
      dockerfile: apps/disability-insurance-compare/Dockerfile
    container_name: disability-insurance-app
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER:-traffic2u_user}:${DATABASE_PASSWORD:-change_me_strong_password}@postgres:5432/traffic2u
      NEXT_PUBLIC_APP_URL: ${DISABILITY_APP_URL:-https://disabilityquotehub.com}
      NEXT_PUBLIC_API_URL: ${DISABILITY_API_URL:-https://disabilityquotehub.com/api}
      RESEND_API_KEY: ${RESEND_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - traffic2u_network

  # Cyber Insurance Site
  cyber-insurance:
    build:
      context: .
      dockerfile: apps/cyber-insurance-compare/Dockerfile
    container_name: cyber-insurance-app
    ports:
      - "3003:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER:-traffic2u_user}:${DATABASE_PASSWORD:-change_me_strong_password}@postgres:5432/traffic2u
      NEXT_PUBLIC_APP_URL: ${CYBER_APP_URL:-https://cybersmallbizcompare.com}
      NEXT_PUBLIC_API_URL: ${CYBER_API_URL:-https://cybersmallbizcompare.com/api}
