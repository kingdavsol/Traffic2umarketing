  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: traffic2u_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - pet-insurance
      - disability-insurance
      - cyber-insurance
      - travel-insurance
      - umbrella-insurance
      - motorcycle-insurance
      - sr22-insurance
      - wedding-insurance
      - drone-insurance
      - landlord-insurance
